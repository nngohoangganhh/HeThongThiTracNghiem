<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Spring Boot Static Page</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      margin: 2rem;
      background: #f7f9fc;
      color: #222;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(20,30,50,0.06);
    }
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    pre { background:#f3f4f6; padding: .5rem; border-radius:4px; overflow:auto; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome</h1>
    <p>This is a simple static page served from <code>/static/index.html</code> in a Spring Boot app.</p>

    <p>
      Click the button to run a small JavaScript action that updates the page.
    </p>

    <p>
      <button id="actionBtn">Click me</button>
    </p>

    <section id="output" aria-live="polite"></section>

    <h3>Example JSON (for reference)</h3>
    <pre id="jsonSample">{ "message": "hello", "time": "" }</pre>
  </main>

  <script>
    const btn = document.getElementById('actionBtn');
    const out = document.getElementById('output');
    const sample = document.getElementById('jsonSample');

    btn.addEventListener('click', () => {
      const now = new Date().toISOString();
      out.textContent = 'Button clicked at: ' + now;
      sample.textContent = JSON.stringify({ message: 'hello', time: now }, null, 2);

      // Optional: call a backend endpoint if you have one
      // fetch('/api/ping').then(r => r.json()).then(data => console.log(data)).catch(() => {});
    });
  </script>
</body>
</html>
